<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit submission #{{ id }} — Overdue Progress</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --ink: #1a1a1a;
        --muted: #6b6b6b;
        --rule: #e6e6e6;
        --bg: #fafaf8;
        --card: #ffffff;
        --accent: #0b3d91;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--ink);
        font-family: "Source Serif 4", Georgia, serif;
        font-size: 17px;
        line-height: 1.6;
      }
      main {
        max-width: 720px;
        margin: 0 auto;
        padding: 56px 24px 120px;
      }
      header.page {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 16px;
        border-bottom: 1px solid var(--rule);
        padding-bottom: 20px;
        margin-bottom: 32px;
      }
      header.page h1 {
        font-size: 26px;
        font-weight: 700;
        margin: 0;
        letter-spacing: -0.01em;
      }
      header.page .id {
        font-family:
          ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 13px;
        color: #999;
      }
      .crumbs {
        font-size: 14px;
        color: var(--muted);
        margin-bottom: 12px;
      }
      .crumbs a {
        color: var(--muted);
        text-decoration: none;
        border-bottom: 1px dotted #c4c4c4;
      }
      .crumbs a:hover {
        color: var(--accent);
        border-bottom-color: var(--accent);
      }
      form.edit {
        background: var(--card);
        border: 1px solid var(--rule);
        border-radius: 6px;
        padding: 24px 28px;
      }
      label {
        display: block;
        margin-top: 18px;
        font-weight: 600;
        font-size: 15px;
      }
      label:first-of-type {
        margin-top: 0;
      }
      input[type="text"],
      input[type="email"],
      input[type="url"],
      textarea {
        width: 100%;
        font-family: inherit;
        font-size: 16px;
        padding: 10px 12px;
        margin-top: 6px;
        border: 1px solid #bbb;
        border-radius: 4px;
        background: #fafafa;
      }
      textarea {
        min-height: 160px;
        resize: vertical;
      }
      input:focus,
      textarea:focus {
        outline: none;
        border-color: var(--ink);
      }
      .actions {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-top: 24px;
      }
      button.save {
        font-family: inherit;
        font-size: 15px;
        padding: 9px 18px;
        background: var(--ink);
        color: #fff;
        border: none;
        border-radius: 4px;
        cursor: pointer;
      }
      button.save:hover {
        background: #000;
      }
      a.cancel,
      a.history {
        font-size: 14px;
        color: var(--muted);
        text-decoration: none;
        border-bottom: 1px dotted #c4c4c4;
      }
      a.cancel:hover,
      a.history:hover {
        color: var(--accent);
        border-bottom-color: var(--accent);
      }
      .flash {
        padding: 12px 16px;
        margin-bottom: 18px;
        border-radius: 4px;
      }
      .flash.error {
        background: #fbeaea;
        color: #8a1f1f;
        border: 1px solid #e4bcbc;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="crumbs">
        <a href="/admin">Submissions</a> · Edit
      </p>
      <header class="page">
        <h1>Edit submission</h1>
        <span class="id">#{{ id }}</span>
      </header>

      {% if flash %}
        <div class="flash error">{{ flash }}</div>
      {% endif %}

      <form class="edit" method="post" action="/admin/submissions/{{ id }}/edit">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}" />

        <label for="title">
          Title
          <input
            type="text"
            id="title"
            name="title"
            required
            maxlength="200"
            value="{{ values.title }}"
          />
        </label>

        <label for="description">
          Description
          <textarea
            id="description"
            name="description"
            required
            maxlength="2000"
          >{{ values.description }}</textarea>
        </label>

        <label for="author">
          Author
          <input
            type="text"
            id="author"
            name="author"
            required
            maxlength="200"
            value="{{ values.author }}"
          />
        </label>

        <label for="email">
          Email
          <input
            type="email"
            id="email"
            name="email"
            required
            maxlength="320"
            value="{{ values.email }}"
          />
        </label>

        <label for="link">
          Essay link
          <input
            type="url"
            id="link"
            name="link"
            required
            maxlength="2000"
            value="{{ values.link }}"
          />
        </label>

        <div class="actions">
          <button class="save" type="submit">Save changes</button>
          <a class="cancel" href="/admin">Cancel</a>
          <a class="history" href="/admin/submissions/{{ id }}/history">View history</a>
        </div>
      </form>
    </main>
  </body>
</html>
