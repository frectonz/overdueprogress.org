<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register a passkey — Overdue Progress</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --ink: #1a1a1a;
        --muted: #6b6b6b;
        --rule: #e6e6e6;
        --bg: #fafaf8;
        --card: #fff;
      }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--ink);
        font-family: "Source Serif 4", Georgia, serif;
        font-size: 17px;
        line-height: 1.6;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }
      main {
        background: var(--card);
        border: 1px solid var(--rule);
        border-radius: 6px;
        padding: 40px 44px;
        max-width: 460px;
        width: calc(100% - 48px);
      }
      h1 {
        font-size: 26px;
        font-weight: 700;
        margin: 0 0 8px;
        text-align: center;
      }
      p {
        color: var(--muted);
        margin: 0 0 20px;
        text-align: center;
      }
      label {
        display: block;
        font-weight: 600;
        font-size: 14px;
        margin-top: 16px;
        margin-bottom: 4px;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        font-family: inherit;
        font-size: 16px;
        padding: 10px 12px;
        border: 1px solid #bbb;
        border-radius: 4px;
        background: #fafafa;
      }
      input:focus {
        outline: none;
        border-color: var(--ink);
      }
      button {
        margin-top: 24px;
        font-family: inherit;
        font-size: 16px;
        padding: 12px 24px;
        background: var(--ink);
        color: #fff;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        width: 100%;
      }
      button:hover:not(:disabled) {
        background: #000;
      }
      button:disabled {
        opacity: 0.6;
        cursor: progress;
      }
      .status {
        margin-top: 20px;
        min-height: 24px;
        font-size: 14px;
        text-align: center;
      }
      .status.error {
        color: #8a1f1f;
      }
      .status.success {
        color: #1f6b2b;
      }
      .status.info {
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Register a passkey</h1>
      <p>Add a passkey to sign in to the admin dashboard.</p>
      <label for="label">Device label</label>
      <input id="label" type="text" value="My laptop" maxlength="60" />
      <button id="register" type="button">Register passkey</button>
      <div id="status" class="status"></div>
    </main>
    <script>
      const btn = document.getElementById("register");
      const labelInput = document.getElementById("label");
      const status = document.getElementById("status");

      btn.addEventListener("click", async () => {
        btn.disabled = true;
        status.textContent = "Waiting for passkey prompt…";
        status.className = "status info";
        try {
          const startRes = await fetch("/admin/register/start", {
            method: "POST",
          });
          if (!startRes.ok) throw new Error(await startRes.text());
          const { publicKey } = await startRes.json();
          const cred = await navigator.credentials.create({
            publicKey: PublicKeyCredential.parseCreationOptionsFromJSON(publicKey),
          });
          if (!cred) throw new Error("No credential returned");
          const label = encodeURIComponent(labelInput.value || "passkey");
          const finishRes = await fetch(
            "/admin/register/finish?label=" + label,
            {
              method: "POST",
              headers: { "content-type": "application/json" },
              body: JSON.stringify(cred.toJSON()),
            },
          );
          if (!finishRes.ok) throw new Error(await finishRes.text());
          status.textContent = "Registered. Redirecting to sign-in…";
          status.className = "status success";
          setTimeout(() => {
            window.location.href = "/admin/login";
          }, 1000);
        } catch (err) {
          status.textContent = "Registration failed: " + (err.message || err);
          status.className = "status error";
          btn.disabled = false;
        }
      });
    </script>
  </body>
</html>
