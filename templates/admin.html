<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin — Overdue Progress</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --ink: #1a1a1a;
        --muted: #6b6b6b;
        --rule: #e6e6e6;
        --bg: #fafaf8;
        --card: #ffffff;
        --accent: #0b3d91;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--ink);
        font-family: "Source Serif 4", Georgia, serif;
        font-size: 17px;
        line-height: 1.6;
      }
      main {
        max-width: 820px;
        margin: 0 auto;
        padding: 56px 24px 120px;
      }
      header.page {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 16px;
        border-bottom: 1px solid var(--rule);
        padding-bottom: 20px;
        margin-bottom: 32px;
      }
      header.page h1 {
        font-size: 30px;
        font-weight: 700;
        margin: 0;
        letter-spacing: -0.01em;
      }
      header.page .count {
        color: var(--muted);
        font-size: 14px;
        font-variant-numeric: tabular-nums;
      }
      header.page .right {
        display: flex;
        align-items: center;
        gap: 16px;
      }
      .logout {
        margin: 0;
      }
      .logout button {
        font-family: inherit;
        font-size: 13px;
        color: var(--muted);
        background: transparent;
        border: 1px solid var(--rule);
        padding: 6px 12px;
        border-radius: 4px;
        cursor: pointer;
      }
      .logout button:hover {
        color: var(--ink);
        border-color: #bdbdbd;
      }
      .empty {
        color: var(--muted);
        font-style: italic;
        margin-top: 60px;
        text-align: center;
      }
      article.submission {
        background: var(--card);
        border: 1px solid var(--rule);
        border-radius: 6px;
        padding: 24px 28px;
        margin-bottom: 18px;
        transition: border-color 0.15s ease;
      }
      article.submission:hover {
        border-color: #bdbdbd;
      }
      article.submission h2 {
        font-size: 22px;
        font-weight: 600;
        margin: 0 0 8px;
        line-height: 1.3;
        letter-spacing: -0.005em;
      }
      .meta {
        font-size: 14px;
        color: var(--muted);
        margin: 0 0 14px;
        display: flex;
        flex-wrap: wrap;
        gap: 6px 12px;
        align-items: center;
      }
      .meta .sep {
        color: #c4c4c4;
      }
      .meta .id {
        font-family:
          ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 12px;
        color: #999;
        margin-left: auto;
      }
      .meta time {
        font-variant-numeric: tabular-nums;
      }
      .meta a {
        color: var(--muted);
        text-decoration: none;
        border-bottom: 1px dotted #c4c4c4;
      }
      .meta a:hover {
        color: var(--accent);
        border-bottom-color: var(--accent);
      }
      .description {
        margin: 0 0 18px;
        color: #3a3a3a;
        white-space: pre-wrap;
      }
      .link-row {
        display: flex;
        align-items: center;
        gap: 10px;
        padding-top: 14px;
        border-top: 1px solid var(--rule);
      }
      .link-row .label {
        font-size: 13px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }
      .link-row .link-wrap {
        flex: 1;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .link-row a.essay-link {
        font-size: 15px;
        color: var(--accent);
        text-decoration: underline;
        text-decoration-color: #cfd8eb;
        text-underline-offset: 3px;
      }
      .link-row a.essay-link:hover {
        text-decoration-color: var(--accent);
      }
      .actions {
        margin-left: auto;
      }
      .actions form {
        margin: 0;
      }
      .actions button {
        font-family: inherit;
        font-size: 13px;
        color: #a33;
        background: transparent;
        border: 1px solid var(--rule);
        padding: 6px 12px;
        border-radius: 4px;
        cursor: pointer;
      }
      .actions button:hover {
        color: #fff;
        background: #a33;
        border-color: #a33;
      }
    </style>
  </head>
  <body>
    <main>
      <header class="page">
        <h1>Submissions</h1>
        <div class="right">
          <span class="count">
            {{ rows | length }} {{ "entry" if rows | length == 1 else "entries" }}
          </span>
          <form method="post" action="/admin/logout" class="logout">
            <button type="submit">Sign out</button>
          </form>
        </div>
      </header>

      {% if rows %}
        {% for r in rows %}
          <article class="submission">
            <h2>{{ r.title }}</h2>
            <p class="meta">
              <span class="author">{{ r.author }}</span>
              <span class="sep">·</span>
              <a href="mailto:{{ r.email }}">{{ r.email }}</a>
              <span class="sep">·</span>
              <time datetime="{{ r.created_at }}" title="{{ r.created_at }}"
                >{{ r.created_at }}</time
              >
              <span class="id">#{{ r.id }}</span>
            </p>
            <p class="description">{{ r.description }}</p>
            <div class="link-row">
              <span class="label">Essay</span>
              <span class="link-wrap">
                <a
                  class="essay-link"
                  href="{{ r.link }}"
                  target="_blank"
                  rel="noopener"
                  title="{{ r.link }}"
                  >{{ r.link }}</a
                >
              </span>
              <span class="actions">
                <form
                  method="post"
                  action="/admin/submissions/{{ r.id }}/delete"
                  onsubmit="return confirm('Delete this submission? This cannot be undone.');"
                >
                  <input type="hidden" name="csrf_token" value="{{ csrf_token }}" />
                  <button type="submit">Delete</button>
                </form>
              </span>
            </div>
          </article>
        {% endfor %}
      {% else %}
        <p class="empty">No submissions yet.</p>
      {% endif %}
    </main>
    <script>
      (function () {
        if (typeof Intl === "undefined" || !Intl.RelativeTimeFormat) return;
        const rtf = new Intl.RelativeTimeFormat(undefined, { numeric: "auto" });
        const UNITS = [
          ["year", 31536000],
          ["month", 2592000],
          ["week", 604800],
          ["day", 86400],
          ["hour", 3600],
          ["minute", 60],
          ["second", 1],
        ];
        function relative(iso) {
          const t = Date.parse(iso);
          if (Number.isNaN(t)) return null;
          const diff = (t - Date.now()) / 1000;
          const abs = Math.abs(diff);
          for (const [unit, secs] of UNITS) {
            if (abs >= secs || unit === "second") {
              return rtf.format(Math.round(diff / secs), unit);
            }
          }
        }
        document.querySelectorAll("time[datetime]").forEach((el) => {
          const rel = relative(el.getAttribute("datetime"));
          if (rel) el.textContent = rel;
        });
      })();
    </script>
  </body>
</html>
